name: vite-frontend - Deploy to AWS EC2 (Production Mode)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy vite-frontend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🔐 Add EC2 Host to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: 📤 Upload Files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          source: "."
          target: "~/invision_store"

      - name: 🚀 SSH & Deploy invision_store (Production)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            cd ~/invision_store

            # Install PM2 if not installed
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi

            # Install dependencies
            npm install --legacy-peer-deps

            # Build the Vite app for production
            npm run build

            # Kill any previous instance
            pm2 delete invision_store || true

            # Start the app using Vite preview in production mode
            NODE_ENV=production pm2 start npm --name invision_store -- run start
